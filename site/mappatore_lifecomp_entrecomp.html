16","ft":"Assistere gli altri nella gestione di base dell'identità digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.6.17","ft":"Mantenersi aggiornati sugli sviluppi nelle tecnologie digitali in relazione alla gestione e protezione dell'identità digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.6.18","ft":"Supportare gli altri nell'approfondimento delle proprie capacità di gestione e cura delle identità digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.6.19","ft":"Consigliare gli altri su aspetti complessi della gestione dell'identità digitale e dei relativi diritti.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.01","ft":"Riconoscere i benefici dell'esplorazione di una varietà di strumenti di creazione di contenuti digitali a supporto di obiettivi fissati in questo ambito.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.02","ft":"Riconoscere l'importanza di contenuti digitali accessibili e inclusivi.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.03","ft":"Identificare i tipi comuni di contenuti digitali e formati di file, e le funzioni operative comuni tra gli strumenti di creazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.04","ft":"Riconoscere che mentre i sistemi di IA possono generare e integrare contenuti digitali, gli esseri umani sono essenziali per garantire output etici, responsabili e appropriati al contesto.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.05","ft":"Riconoscere che l'IA generativa è un tipo particolare di IA ed è una delle varie tecnologie digitali che possono essere utilizzate per supportare la creazione di contenuti.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.06","ft":"Utilizzare le funzionalità di base degli strumenti di creazione di contenuti per creare e modificare contenuti digitali (testi, immagini, video e/o audio).","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.07","ft":"Esplorare intenzionalmente caratteristiche e funzioni degli strumenti di creazione di contenuti digitali per approfondire le proprie capacità al riguardo.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.08","ft":"Descrivere benefici e limitazioni nell'uso di tecnologie digitali come i sistemi di IA per la creazione di contenuti, utilizzandoli in modo selettivo ed etico.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.09","ft":"Utilizzare una varietà di strumenti di creazione di contenuti per creare e modificare contenuti digitali (testi, immagini, video e/o audio).","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.10","ft":"Applicare strategie che consentono una creazione efficiente di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.11","ft":"Valutare le esigenze di accessibilità e inclusività del pubblico, e creare e modificare contenuti digitali di conseguenza.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.12","ft":"Riconoscere l'importanza di valutare capacità, vincoli e aspetti etici degli strumenti di creazione di contenuti digitali per garantirne la selezione e un uso appropriati.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.13","ft":"Selezionare e combinare strumenti e metodi di creazione di contenuti digitali per soddisfare requisiti di compiti creativi complessi e del pubblico destinatario.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.14","ft":"Creare e modificare una varietà di contenuti digitali complessi o specializzati, adattati in modo appropriato agli obiettivi e al pubblico destinatario.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.15","ft":"Supportare gli altri nello sviluppo delle proprie capacità di creazione di contenuti digitali utilizzando approcci etici e responsabili.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.16","ft":"Promuovere e sostenere l'accessibilità e l'inclusività, e l'uso selettivo ed etico dei sistemi di IA, nella creazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.17","ft":"Assistere gli altri nello sviluppare capacità avanzate di creazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.18","ft":"Guidare o contribuire a iniziative di creazione di contenuti digitali complessi o specializzati.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.1.19","ft":"Guidare o contribuire a miglioramenti o nuove soluzioni per contenuti digitali complessi o specializzati.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.01","ft":"Riconoscere l'importanza di pratiche etiche e trasparenti nel riutilizzo o nell'elaborazione dei contenuti digitali esistenti.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.02","ft":"Riconoscere i benefici dell'esplorazione di strumenti e tecniche di integrazione ed elaborazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.03","ft":"Distinguere tra contenuti digitali modificabili e non modificabili.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.04","ft":"Apportare modifiche ai contenuti digitali esistenti utilizzando funzioni di base di editing, formattazione e integrazione.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.05","ft":"Esplorare intenzionalmente una varietà di modi per integrare e rielaborare contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.06","ft":"Adattare o integrare contenuti digitali per soddisfare requisiti di formato, struttura e pubblico destinatario.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.07","ft":"Modificare o trasformare rappresentazioni digitali testuali, numeriche o visive per trasmettere efficacemente e accuratamente il significato di dati e informazioni.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.08","ft":"Utilizzare le tecnologie digitali in modo selettivo, etico, trasparente e responsabile per apportare miglioramenti o integrazioni a contenuti digitali esistenti.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.09","ft":"Adattare o integrare una varietà di contenuti digitali per soddisfare requisiti complessi di formato, struttura e pubblico destinatario.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.10","ft":"Applicare le tecnologie digitali in modo selettivo, etico e trasparente per apportare miglioramenti o integrazioni a contenuti digitali complessi.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.11","ft":"Supportare gli altri nello sviluppo delle loro capacità di integrazione e rielaborazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.12","ft":"Promuovere e sostenere pratiche etiche e trasparenti nell'integrazione e rielaborazione di contenuti digitali, informate dagli sviluppi tecnologici digitali attuali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.13","ft":"Valutare e applicare tecniche avanzate di design e visualizzazione dei dati per l'integrazione e la rielaborazione di contenuti digitali complessi o specializzati.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.14","ft":"Assistere gli altri in compiti complessi di integrazione o rielaborazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.2.15","ft":"Guidare o contribuire a iniziative complesse di integrazione o rielaborazione di contenuti digitali, o a miglioramenti o nuove soluzioni per l'integrazione o la rielaborazione di contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.01","ft":"Riconoscere i concetti generali di copyright e licenza nei contesti digitali, e che i contenuti digitali originali creati da una persona sono automaticamente protetti dal copyright.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.02","ft":"Riconoscere che diversi tipi di copyright e licenze possono applicarsi ai contenuti digitali, inclusi i contenuti generati dall'IA, determinando come tali contenuti possono essere utilizzati e condivisi.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.03","ft":"Riconoscere che i contenuti generati dall'IA dovrebbero essere etichettati come tali per aiutare gli altri a comprenderne l'origine e le possibilità di ulteriore utilizzo.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.04","ft":"Utilizzare e condividere contenuti digitali nel rispetto delle linee guida legali ed etiche di base e identificare i contenuti digitali che possono essere utilizzati gratuitamente.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.05","ft":"Riconoscere la natura complessa del copyright e delle licenze in contesti digitali, privilegiando un approccio prudente.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.06","ft":"Definire il concetto di proprietà intellettuale e distinguere tra copyright, marchio, design e brevetto.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.07","ft":"Identificare i tipi e gli scopi comuni delle licenze in contesti digitali, incluse le licenze Creative Commons.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.08","ft":"Descrivere le implicazioni etiche, legali e commerciali delle violazioni del copyright in contesti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.09","ft":"Identificare esempi di sfide legali ed etiche relative al copyright nell'addestramento dei modelli di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.10","ft":"Applicare le linee guida legali ed etiche in modo appropriato quando si utilizzano e si condividono contenuti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.11","ft":"Descrivere le caratteristiche chiave della legislazione vigente in relazione al copyright e alle licenze digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.12","ft":"Descrivere esempi di casi in cui il copyright si applica e non si applica in contesti digitali, distinguendo tra dati di addestramento per i sistemi di IA e contenuti generati dall'IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.13","ft":"Valutare e applicare correttamente le linee guida legali ed etiche per l'utilizzo e la condivisione di contenuti digitali in contesti complessi (ad esempio in relazione ai sistemi di IA).","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.14","ft":"Assistere gli altri nell'utilizzo e nella condivisione di contenuti digitali in conformità con le linee guida legali ed etiche.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.15","ft":"Promuovere e supportare la consapevolezza e la comprensione delle pratiche legali ed etiche relative al copyright e alle licenze in contesti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.16","ft":"Applicare conoscenze avanzate sui diritti di proprietà intellettuale, sul copyright e sui concetti di licenza in contesti digitali per informare i processi decisionali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.3.17","ft":"Guidare o contribuire a politiche o linee guida sul copyright e sulle licenze in contesti digitali.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.01","ft":"Riconoscere il ruolo della programmazione nella società e gli usi comuni dei programmi e delle applicazioni informatiche.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.02","ft":"Riconoscere il pensiero computazionale come un'attività umana che comporta l'identificazione di passaggi che possono essere eseguiti da un computer per risolvere un problema o un compito.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.03","ft":"Riconoscere cosa sia l'IA in termini generali, operando una distinzione di base tra ciò che è e ciò che non è un sistema di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.04","ft":"Rappresentare sequenze semplici in modo simbolico, interpretare sequenze simboliche semplici e dare istruzioni di base a un computer per eseguire compiti semplici.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.05","ft":"Riconoscere la rilevanza del pensiero computazionale, della rappresentazione algoritmica e della programmazione nei contesti quotidiani.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.06","ft":"Distinguere tra un modello computazionale della realtà e la realtà stessa.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.07","ft":"Definire le differenze tra un problema computabile e un problema non computabile, e i passaggi generali nel pensiero computazionale.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.08","ft":"Definire i concetti fondamentali di programmazione e riconoscere che esistono diversi linguaggi di programmazione, ciascuno con una gamma di potenziali utilizzi.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.09","ft":"Riconoscere che l'apprendimento automatico è un tipo di programmazione utilizzato nell'IA che consente agli algoritmi di apprendere dai dati e fare previsioni.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.10","ft":"Riconoscere che esistono passaggi che dovrebbero essere seguiti per sviluppare, validare e implementare un programma informatico o un sistema di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.11","ft":"Tradurre informazioni di base in operazioni logiche, sviluppare programmi di base con strutture di controllo e creare rappresentazioni visive per illustrare algoritmi di base.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.12","ft":"Riconoscere l'importanza della supervisione umana e degli approcci incentrati sulla persona nello sviluppo e nell'implementazione di programmi informatici e sistemi di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.13","ft":"Descrivere i passaggi principali nello sviluppo, nella validazione e nell'implementazione di un programma informatico o di un sistema di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.14","ft":"Descrivere esempi di applicazione del pensiero computazionale e della programmazione nella robotica.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.15","ft":"Distinguere tra i principali tipi di apprendimento automatico.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.16","ft":"Valutare gli aspetti etici e pratici dello sviluppo e dell'implementazione di programmi informatici e sistemi di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.17","ft":"Identificare e automatizzare (parzialmente o completamente) compiti di routine con strumenti di programmazione o sistemi di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.18","ft":"Applicare strumenti di programmazione o sistemi di IA a compiti complessi di pensiero computazionale.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.19","ft":"Promuovere e supportare pratiche etiche di programmazione e/o sviluppo di sistemi di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.20","ft":"Mantenersi informate sugli sviluppi attuali nelle tecniche di programmazione e nelle relative applicazioni dei sistemi di IA, come la robotica.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.21","ft":"Guidare o contribuire a progetti complessi focalizzati su applicazioni del pensiero computazionale, della programmazione o dei sistemi di IA, inclusi lo sviluppo, la validazione e l'implementazione di programmi informatici o sistemi di IA.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS3.4.22","ft":"Assistere gli altri nello sviluppo di capacità di programmazione di base e/o di capacità nell'applicazione dei sistemi di IA a compiti di pensiero computazionale.","fa":"Creazione di contenuti","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.01","ft":"Riconoscere l'importanza del proprio ruolo individuale nella protezione dei dispositivi digitali e dei loro contenuti.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.02","ft":"Riconoscere che le azioni individuali e gli strumenti di cybersicurezza lavorano insieme per contribuire a mantenere sicuri i dispositivi e i loro contenuti.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.03","ft":"Riconoscere che esiste una legislazione sulla cybersicurezza che contribuisce a garantire la sicurezza dei prodotti e dei servizi.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.04","ft":"Identificare e applicare misure di base per la protezione dei dispositivi come software antivirus, blocco schermo, password complesse e autenticazione a più fattori.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.05","ft":"Riconoscere l'importanza di rimanere vigili e aggiornati sulle pratiche di cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.06","ft":"Descrivere le principali caratteristiche del malware e applicare una varietà di tecniche di prevenzione del malware per proteggere i dispositivi e i loro contenuti.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.07","ft":"Riconoscere che le tecnologie digitali recenti ed emergenti come i sistemi di IA possono essere utilizzate sia per gli attacchi informatici sia per la cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.08","ft":"Dare priorità al controllo e all'aggiornamento regolare delle misure di cybersicurezza per proteggere i dispositivi e i loro contenuti in risposta alle minacce digitali in evoluzione.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.09","ft":"Descrivere i diritti fondamentali delle persone ai sensi della legislazione vigente sulla cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.10","ft":"Identificare esempi di come le tecnologie recenti ed emergenti, come i sistemi di IA, sono utilizzate negli attacchi informatici e nella cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.11","ft":"Assistere gli altri nell'implementazione di misure di protezione di base per la cybersicurezza, come software antivirus, blocco schermo, password complesse e autenticazione a più fattori.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.12","ft":"Mantenersi informate sugli sviluppi tecnologici digitali e legislativi in relazione alla cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.13","ft":"Valutare i diritti degli individui ai sensi della legislazione vigente sulla cybersicurezza.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.14","ft":"Guidare o contribuire a iniziative di cybersicurezza incentrate sui cittadini.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.1.15","ft":"Supportare gli altri nello sviluppo delle loro capacità di protezione dei loro dispositivi e contenuti contro le minacce digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.01","ft":"Riconoscere l'importanza di un approccio cauto alla condivisione dei dati personali in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.02","ft":"Riconoscere che i dati personali sono raccolti e generati tramite un'ampia varietà di fonti e processi digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.03","ft":"Riconoscere che metodi manipolativi possono essere utilizzati negli ambienti digitali per ingannare le persone e indurle a fornire accesso a dati personali, account o altre informazioni sensibili.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.04","ft":"Identificare i rischi della condivisione di dati personali in ambienti digitali, inclusi i rischi specifici in relazione ai sistemi di IA.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.05","ft":"Riconoscere che le persone hanno diritto alla privacy e che i loro dati personali sono protetti dalla legislazione.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.06","ft":"Implementare misure di sicurezza di base per pagamenti e transazioni online.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.07","ft":"Bloccare o segnalare informazioni personali che sono state condivise in modo inappropriato online.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.08","ft":"Riconoscere e rispondere in modo appropriato ai segnali di furto di identità.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.09","ft":"Riconoscere l'importanza di una gestione attenta dei dati personali propri e altrui, specialmente di persone vulnerabili e bambini.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.10","ft":"Riconoscere i concetti chiave relativi alla legislazione sulla protezione dei dati e sulla privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.11","ft":"Definire lo scopo delle informative sulla privacy online e i principali concetti delle politiche sulla privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.12","ft":"Definire la violazione dei dati personali ai sensi della legislazione vigente sulla protezione dei dati e sulla privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.13","ft":"Descrivere le implicazioni per la privacy associate all'uso di contenuti condivisi online, ad esempio per addestrare sistemi di IA, riconoscendo che la regolamentazione della proprietà dei dati personali nei contenuti condivisi online è complessa.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.14","ft":"Descrivere tecniche di ingegneria sociale in ambienti digitali, come il phishing o il baiting, identificando e rispondendo in modo appropriato ai casi in cui si presentano.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.15","ft":"Gestire in modo sicuro i dati personali e la privacy in una varietà di ambienti digitali, incluso l'uso di strumenti per la privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.16","ft":"Esplorare sistematicamente le questioni relative alla proprietà dei dati e alla privacy in relazione agli sviluppi tecnologici digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.17","ft":"Supportare gli altri nella comprensione dei propri diritti ai sensi della legislazione vigente sulla protezione dei dati e sulla privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.18","ft":"Assistere gli altri nell'implementazione di strategie di base per proteggere i dati personali e gestire la privacy in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.19","ft":"Mantenersi informate sugli sviluppi tecnologici digitali e legislativi in relazione ai dati personali, alla proprietà dei dati e alla privacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.20","ft":"Fornire consulenza sugli aspetti di policy o normativi della protezione dei dati e della privacy in contesti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.2.21","ft":"Guidare o contribuire alla progettazione di strategie di protezione dei dati personali in contesti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.01","ft":"Riconoscere i benefici dell'equilibrio tra attività online e offline, e i benefici e i rischi per il proprio benessere fisico, mentale e sociale nell'uso delle tecnologie digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.02","ft":"Riconoscere come le proprie abitudini digitali risentono delle caratteristiche delle piattaforme o dei servizi digitali progettati per catturare e mantenere l'attenzione degli utenti.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.03","ft":"Riconoscere che esiste una varietà di informazioni, gruppi e comunità negli ambienti digitali che possono supportare il proprio benessere fisico, mentale e/o sociale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.04","ft":"Identificare limitazioni e rischi dell'uso di assistenti virtuali e sistemi di IA per supportare il benessere umano.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.05","ft":"Riconoscere che esistono leggi e regolamenti che contribuiscono a proteggere il benessere delle persone in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.06","ft":"Effettuare una valutazione di base delle proprie abitudini digitali in relazione al proprio benessere fisico, mentale e sociale, con consapevolezza dei segnali di un uso problematico, e identificare e attuare strategie per supportare il proprio benessere.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.07","ft":"Riconoscere l'importanza del diritto proprio e altrui alla disconnessione e i benefici di rivedere regolarmente i propri schemi di utilizzo del digitale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.08","ft":"Descrivere gli impatti su sé stessi e sugli altri di comportamenti e contenuti dannosi e design ingannevoli negli ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.09","ft":"Identificare fonti affidabili di informazioni, e gruppi e comunità inclusivi in ambienti digitali, che possano supportare il proprio benessere fisico, mentale e/o sociale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.10","ft":"Identificare possibili modi per segnalare o intervenire se si incontrano comportamenti o contenuti dannosi in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.11","ft":"Descrivere i modi in cui alcune applicazioni di tecnologie digitali, come i social media, amplificano e perpetuano pregiudizi, stereotipi ed esclusione.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.12","ft":"Attuare strategie per proteggersi e rispondere efficacemente a comportamenti e contenuti dannosi e design ingannevoli in ambienti digitali, e per supportare e mantenere il proprio benessere e quello altrui.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.13","ft":"Adattarsi agli sviluppi tecnologici digitali e ai bisogni in continua evoluzione per supportare e mantenere il benessere fisico, mentale e sociale proprio e altrui.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.14","ft":"Esaminare sistematicamente il ruolo delle tecnologie digitali come i social media nell'amplificare e perpetuare pregiudizi, stereotipi ed esclusione.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.15","ft":"Segnalare o intervenire efficacemente in casi di comportamenti o contenuti dannosi in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.16","ft":"Assistere gli altri nel rivedere e adattare il proprio utilizzo delle tecnologie digitali e nello sviluppare consapevolezza dei comportamenti e contenuti dannosi e design ingannevoli in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.17","ft":"Assistere gli altri nello sviluppare capacità per contrastare il ruolo delle tecnologie digitali come i social media nell'amplificare e perpetuare pregiudizi, stereotipi ed esclusione.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.18","ft":"Assistere gli altri nella comprensione dei propri diritti in relazione al benessere e/o all'inclusione in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.19","ft":"Promuovere azioni che supportano il benessere e l'inclusione in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.20","ft":"Valutare ed esaminare le evidenze sul benessere e/o l'inclusione negli ambienti digitali per guidare i processi decisionali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.21","ft":"Guidare o contribuire a iniziative che supportano il benessere e/o l'inclusione in ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.3.22","ft":"Contribuire ai processi decisionali nelle iniziative legislative e di regolazione relative al benessere e/o all'inclusione delle persone negli ambienti digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.01","ft":"Riconoscere il ruolo che le persone possono svolgere per contribuire a ridurre l'impatto ambientale delle tecnologie digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.02","ft":"Riconoscere che alcune tecnologie e infrastrutture digitali, come i sistemi di IA e i data center, hanno grandi impatti sull'ambiente.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.03","ft":"Riconoscere che gli impatti ambientali complessivi delle tecnologie digitali non sono immediatamente evidenti al singolo utente.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.04","ft":"Riconoscere che le tecnologie digitali possono supportare l'efficienza energetica e la sostenibilità.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.05","ft":"Identificare e applicare strategie semplici per ridurre il consumo di energia e dati nell'uso delle tecnologie digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.06","ft":"Valutare sistematicamente gli impatti ambientali del proprio utilizzo delle tecnologie digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.07","ft":"Identificare gli impatti ambientali delle tecnologie digitali che si verificano durante la loro produzione, l'utilizzo e lo smaltimento, nonché dei data centre e dell’e-commerce.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.08","ft":"Descrivere esempi di come gli strumenti digitali possono supportare uno stile di vita sostenibile.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.09","ft":"Descrivere i potenziali benefici ambientali dei modelli di condivisione digitale e di economia circolare.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.10","ft":"Valutare e applicare una varietà di strategie per ridurre l'impatto ambientale del proprio uso delle tecnologie digitali e dei dispositivi digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.11","ft":"Mantenersi informate sugli impatti ambientali delle tecnologie digitali e sui modi in cui le tecnologie digitali possono supportare la sostenibilità.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.12","ft":"Valutare gli impatti ambientali delle tecnologie e delle infrastrutture digitali per supportare i processi decisionali o le attività di advocacy.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.13","ft":"Assistere gli altri nel valutare il proprio uso delle tecnologie digitali per identificare modi per ridurre l'impatto ambientale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.14","ft":"Mantenersi informate sulle implicazioni ambientali e di sostenibilità delle tecnologie digitali in una gamma di settori.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.15","ft":"Promuovere e supportare azioni per un utilizzo ambientalmente sostenibile delle tecnologie digitali.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.16","ft":"Guidare o contribuire a iniziative di sostenibilità digitale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS4.4.17","ft":"Contribuire a miglioramenti o soluzioni per la sostenibilità digitale.","fa":"Sicurezza, benessere e uso responsabile","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.01","ft":"Riconoscere la natura comune dei problemi tecnici negli ambienti digitali e i benefici del richiedere assistenza per risolverli.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.02","ft":"Distinguere tra sistemi operativi e software e identificare le principali caratteristiche di hardware, software, connettività e dispositivi periferici comuni.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.03","ft":"Identificare problemi tecnici comuni e seguire le istruzioni per contribuire a risolverli.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.04","ft":"Installare e aggiornare software e applicazioni, secondo necessità.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.05","ft":"Riconoscere i benefici dello sviluppo di capacità e autonomia nell'affrontare problemi tecnici comuni.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.06","ft":"Risolvere problemi tecnici negli ambienti digitali utilizzando una varietà di strategie di ricerca e risoluzione dei problemi (con il supporto umano o con l’ausilio di tecnologie digitali).","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.07","ft":"Aggiornare e regolare le impostazioni sui dispositivi digitali principali e periferici per mantenere buone prestazioni.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.08","ft":"Dare priorità allo sviluppo della propria capacità di diagnosticare e risolvere problemi tecnici in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.09","ft":"Assistere altri nella diagnosi e risoluzione di problemi tecnici in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.10","ft":"Utilizzare una varietà di strategie di ricerca di soluzioni per risolvere problemi tecnici complessi in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.11","ft":"Assistere gli altri nello sviluppare fiducia e autonomia per risolvere problemi tecnici in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.1.12","ft":"Progettare o erogare formazione per supportare l'uso di dispositivi o sistemi digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.01","ft":"Riconoscere l'importanza della scelta individuale nelle configurazioni degli ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.02","ft":"Riconoscere il concetto e lo scopo di uno strumento di assistenza digitale e riconoscere la presenza di sistemi di IA in tali strumenti.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.03","ft":"Identificare lo scopo dell'accessibilità tecnologica ed esempi di tecnologie assistive comuni.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.04","ft":"Riconoscere i benefici dell'esplorazione di adattamenti alle configurazioni degli ambienti digitali e delle funzionalità degli strumenti di assistenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.05","ft":"Fare un uso consapevole degli strumenti di assistenza digitale per supportare le proprie esigenze e quelle degli altri, con consapevolezza dei loro benefici e limitazioni.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.06","ft":"Regolare le caratteristiche del proprio ambiente digitale per adattarle alle esigenze e preferenze proprie e altrui.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.07","ft":"Dare priorità a una valutazione sistematica di come le configurazioni degli ambienti digitali, gli strumenti di assistenza digitale e/o le tecnologie assistive possono soddisfare le esigenze proprie e altrui.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.08","ft":"Regolare le funzionalità degli ambienti digitali e utilizzare strumenti di assistenza digitale e tecnologie assistive per adattarli alle proprie esigenze e preferenze e a quelle altrui.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.09","ft":"Valutare l'accessibilità, l'inclusività, l'equità e/o la sensibilità ai diritti delle tecnologie digitali in un dato contesto.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.10","ft":"Aiutare gli altri a utilizzare in modo consapevole gli strumenti di assistenza digitale e agli aggiustamenti alle configurazioni dell'ambiente digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.11","ft":"Promuovere e supportare l’uso di tecnologie digitali inclusive e accessibili.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.12","ft":"Valutare le esigenze complesse delle persone per identificare e/o progettare soluzioni digitali su misura.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.2.13","ft":"Contribuire a miglioramenti o soluzioni per strumenti di assistenza digitale, configurazioni di ambienti digitali accessibili e/o tecnologie assistive.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.01","ft":"Riconoscere che le tecnologie digitali possono supportare, ma non sostituire, la creatività umana.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.02","ft":"Identificare esempi di come le tecnologie digitali sono utilizzate per risolvere problemi del mondo reale e per apportare miglioramenti o creare nuove soluzioni, prodotti o servizi.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.03","ft":"Identificare esempi di dove le tecnologie digitali possono supportare o potenziare la creatività umana.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.04","ft":"Definire il concetto di approccio incentrato sulla persona e il suo ruolo nello sviluppo e nell'utilizzo delle tecnologie digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.05","ft":"Descrivere punti di forza, debolezze e considerazioni etiche riguardanti le tecnologie digitali, inclusi i sistemi di IA, in relazione alla creatività umana e alla risoluzione dei problemi.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.06","ft":"Utilizzare una varietà di tecnologie digitali in modo responsabile ed etico per supportare la risoluzione dei problemi come individuo o in gruppo.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.07","ft":"Utilizzare una varietà di tecnologie digitali in modo efficiente, responsabile ed etico, dando priorità agli approcci incentrati sulla persona, per aiutare a risolvere problemi complessi.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.08","ft":"Supportare gli altri nello sviluppo della propria fiducia e delle proprie capacità nell’utilizzo delle tecnologie digitali per contribuire a risolvere problemi del mondo reale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.09","ft":"Contribuire alla (co-)creazione o (co-)costruzione di conoscenze complesse o di soluzioni a problemi del mondo reale in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.10","ft":"Guidare o contribuire a iniziative focalizzate sull'applicazione delle tecnologie digitali per la risoluzione di problemi altamente complessi o specializzati.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.11","ft":"Guidare o contribuire a iniziative che utilizzano le tecnologie digitali per aiutare ad apportare miglioramenti o a trovare nuove soluzioni per problemi del mondo reale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.3.12","ft":"Supportare gli altri nello sviluppo delle proprie capacità di utilizzo delle tecnologie digitali per la risoluzione di problemi complessi o specializzati.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.01","ft":"Riconoscere il valore dello sviluppo della propria competenza digitale e i benefici del ricercare supporto nell'affrontare i bisogni di competenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.02","ft":"Riconoscere che la competenza digitale è molto più ampia delle sole competenze tecniche e richiede un aggiornamento regolare per sostenere la vita quotidiana, il lavoro e l'apprendimento.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.03","ft":"Identificare opportunità per migliorare le proprie competenze digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.04","ft":"Riconoscere i benefici del mantenersi informati sugli sviluppi nelle tecnologie digitali per poter identificare i bisogni di apprendimento.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.05","ft":"Valutare accuratamente le proprie competenze digitali e i propri bisogni di competenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.06","ft":"Partecipare attivamente all'apprendimento per soddisfare i propri bisogni di competenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.07","ft":"Valutare sistematicamente gli sviluppi tecnologici digitali e le loro implicazioni per i propri bisogni di competenza digitale e quelli degli altri.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.08","ft":"Impegnarsi in un continuo sviluppo personale per soddisfare i bisogni di competenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.09","ft":"Supportare gli altri a sviluppare fiducia, autonomia e capacità di risoluzione dei problemi in ambienti digitali.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.10","ft":"Elencare le opportunità di apprendimento della competenza digitale disponibili per uno scopo particolare.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.11","ft":"Impegnarsi in un continuo sviluppo personale per soddisfare bisogni di competenza digitale complessi o specializzati.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.12","ft":"Fare da mentore agli altri nell'identificare e nell'affrontare i propri bisogni di competenza digitale.","fa":"Identificazione e risoluzione dei problemi","fw":"DigComp","ver":"3.0"},{"fc":"CS5.4.13","ft":"Progettare materiale didattico per aiutare gli altri a soddisfare bis   document.querySelectorAll('.fw-btn').forEach(b=>{b.classList.remove('active-all');b.style.background='';});
  el.classList.add('active-all');
  if(!fw){el.style.background='var(--blu-bg)';el.style.color='var(--blu)';}
  render();
}
function onSearch(q){
  searchQ=q.toLowerCase();
  document.getElementById('search-clear').style.display=q?'block':'none';
  render();
}
function clearSearch(){ document.getElementById('search-input').value=''; onSearch(''); }

function renderList(){
  const panel=document.getElementById('list-panel');
  const hint=document.getElementById('search-hint');
  if(mode==='a2f'){
    let items=D.ada.map((code,i)=>({i,code,title:D.ada_t[i]}));
    if(fwFilter){
      const a2f=D[model].a2f;
      items=items.filter(it=>(a2f[it.i]||[]).some(([fi])=>D.fw_d[fi].fw===fwFilter));
    }
    if(searchQ) items=items.filter(it=>it.code.toLowerCase().includes(searchQ)||it.title.toLowerCase().includes(searchQ));
    hint.textContent=items.length+' ADA';
    panel.innerHTML=items.map(it=>`
      <div class="list-item ${selectedIdx===it.i?'selected':''}" onclick="sel(${it.i})">
        <div class="li-code">${it.code}</div>
        <div class="li-title">${it.title}</div>
      </div>`).join('');
  } else {
    let items=D.fw.map((k,i)=>({i,k,d:D.fw_d[i]}));
    if(fwFilter) items=items.filter(it=>it.d.fw===fwFilter);
    if(searchQ) items=items.filter(it=>it.d.fc.toLowerCase().includes(searchQ)||it.d.ft.toLowerCase().includes(searchQ)||it.d.fa.toLowerCase().includes(searchQ));
    hint.textContent=items.length+' competenze';
    const byFw={};
    items.forEach(it=>{(byFw[it.d.fw]||(byFw[it.d.fw]=[])).push(it);});
    panel.innerHTML=Object.entries(byFw).map(([fw,its])=>{
      const st=fwSt(fw);
      return `<div class="fw-group-hd" style="background:${st.bg};color:${st.color};border-bottom:2px solid ${st.border}">${st.icon} ${fw}</div>`+
        its.map(it=>`
        <div class="list-item ${selectedIdx===it.i?'selected':''}" onclick="sel(${it.i})">
          <div class="li-code" style="color:${st.color}">${it.d.fc}</div>
          <div class="li-title">${it.d.ft}</div>
          <div class="li-sub">${it.d.fa}</div>
        </div>`).join('');
    }).join('');
  }
}

function renderResults(){
  const panel=document.getElementById('results-panel');
  if(selectedIdx===null){
    panel.innerHTML='<div class="empty-state"><div class="icon">↔️</div><p>Seleziona un elemento dalla lista<br>per vedere i match</p></div>';
    return;
  }
  const topN=parseInt(document.getElementById('top-n-sel').value);
  const [mn,mx]=getRange();
  const dat=D[model];
  const mLabel=model==='bge'?'🧠 BGE-M3':'📊 TF-IDF';

  if(mode==='a2f'){
    const code=D.ada[selectedIdx], title=D.ada_t[selectedIdx];
    let matches=(dat.a2f[selectedIdx]||[]);
    if(fwFilter) matches=matches.filter(([fi])=>D.fw_d[fi].fw===fwFilter);
    matches=matches.slice(0,topN);
    const _url=adaUrl(selectedIdx), _pdf=adaPdf(selectedIdx);
    panel.innerHTML=`
      <div class="results-hd">
        <h2><span style="font-family:monospace;font-size:13px">${code}</span></h2>
        <span class="count-chip">${matches.length} match</span>
        <span class="model-info">${mLabel}</span>
      </div>
      <div style="font-size:13px;color:#374151;margin-bottom:8px;line-height:1.5">${title}</div>
      <div class="ada-links-hd" style="margin-bottom:12px">
        ${_url?`<a href="${_url}" target="_blank" class="ada-link-btn-lg">🔗 Scheda ADA — Atlante del Lavoro</a>`:''}
        ${_pdf?`<a href="${_pdf}" target="_blank" class="ada-link-btn-lg ada-link-pdf">📄 Scheda PDF stampabile</a>`:''}
      </div>
      ${matches.length===0?'<div class="empty-state"><div class="icon">🔍</div><p>Nessun match con i filtri correnti</p></div>':
        matches.map(([fi,score],i)=>compCard(fi,score,i+1,mn,mx)).join('')}`;
  } else {
    const fd=D.fw_d[selectedIdx];
    let matches=(dat.f2a[selectedIdx]||[]).slice(0,topN);
    const st=fwSt(fd.fw);
    panel.innerHTML=`
      <div class="results-hd">
        <h2>
          <span class="fw-badge" style="background:${st.bg};color:${st.color};border-color:${st.border}">${st.icon} ${fd.fw}</span>
          <span style="font-family:monospace;font-size:12px">${fd.fc}</span>
        </h2>
        <span class="count-chip">${matches.length} ADA</span>
        <span class="model-info">${mLabel}</span>
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--testo);margin-bottom:4px">${fd.ft}</div>
      <div style="font-size:12px;color:var(--grigio);margin-bottom:16px">${fd.fa}</div>
      ${matches.length===0?'<div class="empty-state"><div class="icon">🔍</div><p>Nessun ADA trovato</p></div>':
        matches.map(([ai,score],i)=>adaCard(ai,score,i+1,mn,mx)).join('')}`;
  }
}

function compCard(fi,score,rank,mn,mx){
  const fd=D.fw_d[fi], st=fwSt(fd.fw);
  const p=pct(score,mn,mx), c=col(score,mn,mx);
  const rCls=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
  return `<div class="result-card" onclick="switchSel(${fi},false)">
    <div class="result-card-hd">
      <div class="rank-badge ${rCls}">${rank}</div>
      <div class="card-main">
        <div><span class="fw-badge" style="background:${st.bg};color:${st.color};border-color:${st.border}">${st.icon} ${fd.fw}</span><span class="card-code">${fd.fc}</span></div>
        <div class="card-title">${fd.ft}</div>
        <div class="card-area">${fd.fa}</div>
        <div class="score-wrap">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${p}%;background:${c}"></div></div>
          <div class="score-val" style="color:${c}">${score.toFixed(3)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function adaCard(ai,score,rank,mn,mx){
  const code=D.ada[ai], title=D.ada_t[ai];
  const p=pct(score,mn,mx), c=col(score,mn,mx);
  const rCls=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
  const url=adaUrl(ai), pdf=adaPdf(ai);
  const linkBtns=`<div class="ada-links" onclick="event.stopPropagation()">
    ${url?`<a href="${url}" target="_blank" class="ada-link-btn" title="Scheda ADA — Atlante del Lavoro">🔗 Atlante</a>`:''}
    ${pdf?`<a href="${pdf}" target="_blank" class="ada-link-btn ada-link-pdf" title="Scheda PDF stampabile">📄 PDF</a>`:''}
  </div>`;
  return `<div class="result-card" onclick="switchSel(${ai},true)">
    <div class="result-card-hd">
      <div class="rank-badge ${rCls}">${rank}</div>
      <div class="card-main">
        <div class="card-code-row"><span class="card-code">${code}</span>${linkBtns}</div>
        <div class="card-title">${title}</div>
        <div class="score-wrap">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${p}%;background:${c}"></div></div>
          <div class="score-val" style="color:${c}">${score.toFixed(3)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function sel(idx){
  selectedIdx=idx; render();
  setTimeout(()=>{const el=document.querySelector('.list-item.selected');if(el)el.scrollIntoView({block:'nearest'});},30);
}
function switchSel(idx, toAda){
  // Click on a result card: switch mode and select that item
  if(toAda && mode!=='a2f'){
    mode='a2f';
    document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
    document.getElementById('search-input').placeholder='Cerca ADA per codice o titolo...';
    document.getElementById('search-input').value=''; searchQ='';
  } else if(!toAda && mode!=='f2a'){
    mode='f2a';
    document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===1));
    document.getElementById('search-input').placeholder='Cerca competenza...';
    document.getElementById('search-input').value=''; searchQ='';
  }
  sel(idx);
}

function render(){ renderList(); renderResults(); }
render();
</script>
</body>
</html>
