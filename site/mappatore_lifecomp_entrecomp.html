<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HubS – Ricerca Bidirezionale Competenze ↔ ADA</title>
<style>
:root{
  --blu:#1a3a6b; --blu2:#2d6db5; --blu-bg:#e8f0fc;
  --verde:#1b7a4b; --verde-bg:#e6f4ee;
  --grigio:#5f6368; --grigio-bg:#f1f3f4;
  --bordo:#d1d5db; --testo:#1f2937;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4fa;color:var(--testo);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--blu);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.22)}
.logo{font-size:18px;font-weight:700}.logo span{color:#7ab3f5}
.subtitle{font-size:11px;opacity:.75;margin-top:1px}
.home-link{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:4px 10px;transition:all .15s;white-space:nowrap}
.home-link:hover{color:#fff;background:rgba(255,255,255,.15)}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:4px 12px;font-size:11px;white-space:nowrap}
.controls{background:#fff;border-bottom:1px solid var(--bordo);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.model-sel{display:flex;gap:0;border:1px solid var(--bordo);border-radius:8px;overflow:hidden}
.model-btn{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#fff;color:var(--grigio);transition:all .15s}
.model-btn.active{background:var(--blu);color:#fff}
.mode-sel{display:flex;gap:0;border:1px solid var(--bordo);border-radius:8px;overflow:hidden}
.mode-btn{padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#fff;color:var(--grigio);transition:all .15s}
.mode-btn.active{background:var(--verde);color:#fff}
.fw-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;border:1px solid var(--bordo);background:#fff;color:var(--grigio);transition:all .15s}
.fw-btn.active-all{border-color:var(--blu);background:var(--blu-bg);color:var(--blu)}
.ctrl-label{font-size:11px;font-weight:700;color:var(--grigio);white-space:nowrap}
.divider{width:1px;height:24px;background:var(--bordo)}
.top-n{display:flex;align-items:center;gap:6px}
.top-n label{font-size:11px;color:var(--grigio);font-weight:600}
.top-n select{border:1px solid var(--bordo);border-radius:6px;padding:4px 8px;font-size:12px;background:#fff}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.panel-left{width:360px;flex-shrink:0;background:#fff;border-right:1px solid var(--bordo);display:flex;flex-direction:column;overflow:hidden}
.panel-right{flex:1;overflow-y:auto;padding:18px 20px}
.search-box{padding:12px 14px;border-bottom:1px solid var(--bordo)}
.search-input-wrap{position:relative}
.search-input-wrap input{width:100%;border:1.5px solid var(--bordo);border-radius:8px;padding:9px 36px 9px 12px;font-size:13px;outline:none;transition:border-color .15s}
.search-input-wrap input:focus{border-color:var(--blu2)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grigio);font-size:16px;display:none}
.search-hint{font-size:11px;color:var(--grigio);margin-top:6px}
.list-scroll{flex:1;overflow-y:auto}
.list-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.list-item:hover{background:var(--blu-bg)}
.list-item.selected{background:var(--blu-bg);border-left:3px solid var(--blu2);padding-left:11px}
.li-code{font-family:monospace;font-size:11px;font-weight:700;color:var(--blu)}
.li-title{font-size:12px;color:var(--testo);margin-top:2px;line-height:1.4}
.li-sub{font-size:10px;color:var(--grigio);margin-top:3px}
.fw-group-hd{padding:6px 14px 4px;font-size:11px;font-weight:700;position:sticky;top:0;z-index:1}
.results-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.results-hd h2{font-size:15px;font-weight:700;color:var(--blu)}
.results-hd .sub{font-size:11px;color:var(--grigio)}
.count-chip{background:var(--blu-bg);color:var(--blu);font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px}
.empty-state{text-align:center;padding:60px 20px;color:var(--grigio)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}
.result-card{background:#fff;border:1px solid var(--bordo);border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s}
.result-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.result-card-hd{padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.rank-badge{width:22px;height:22px;border-radius:50%;background:var(--grigio-bg);color:var(--grigio);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rank-badge.r1{background:#fef3c7;color:#92400e}
.rank-badge.r2{background:#f0fdf4;color:#166534}
.rank-badge.r3{background:#eff6ff;color:#1e40af}
.card-main{flex:1;min-width:0}
.card-code{font-family:monospace;font-size:11px;font-weight:700;color:var(--blu)}
.card-title{font-size:13px;font-weight:600;color:var(--testo);margin-top:3px;line-height:1.4}
.card-area{font-size:11px;color:var(--grigio);margin-top:2px}
.score-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.score-bar-bg{flex:1;height:6px;border-radius:3px;background:#e5e7eb;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.score-val{font-size:11px;font-weight:700;width:42px;text-align:right}
.fw-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-right:4px;border:1px solid}
.model-info{font-size:10px;background:#f8f9fa;border:1px solid var(--bordo);border-radius:6px;padding:3px 8px;color:var(--grigio)}

  .card-code-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ada-links{display:flex;gap:5px;align-items:center}
  .ada-link-btn{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid #d1d5db;background:#f9fafb;color:#1d4ed8;text-decoration:none;white-space:nowrap;line-height:1.7}
  .ada-link-btn:hover{background:#dbeafe;border-color:#93c5fd}
  .ada-link-pdf{color:#065f46!important;border-color:#d1fae5!important;background:#f0fdf4!important}
  .ada-link-pdf:hover{background:#d1fae5!important}
  .ada-link-btn-lg{font-size:12px;padding:4px 11px;border-radius:6px;border:1px solid #93c5fd;background:#eff6ff;color:#1d4ed8;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-right:6px}
  .ada-link-btn-lg:hover{background:#dbeafe}
  .ada-link-btn-lg.ada-link-pdf{border-color:#6ee7b7;background:#f0fdf4;color:#065f46}
  .ada-link-btn-lg.ada-link-pdf:hover{background:#d1fae5}
</style>
</head>

<header>
  <a href="/" class="home-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Sistema
  </a>
  <a href="/mappatore-competenze" class="home-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

  </a>
  <div>
    <div class="logo">HubS <span>TransparentIA</span></div>
    <div class="subtitle">Ricerca Bidirezionale Competenze ↔ ADA</div>
  </div>
  <div class="hdr-badge">961 ADA · 415 competenze · 2 modelli</div>
</header>

<div class="controls">
  <span class="ctrl-label">Modello:</span>
  <div class="model-sel">
    <button class="model-btn active" onclick="setModel('kw',this)">📊 TF-IDF</button>
    <button class="model-btn" onclick="setModel('bge',this)">🧠 BGE-M3</button>
  </div>
  <div class="divider"></div>
  <span class="ctrl-label">Direzione:</span>
  <div class="mode-sel">
    <button class="mode-btn active" onclick="setMode('a2f',this)">ADA → Competenze</button>
    <button class="mode-btn" onclick="setMode('f2a',this)">Competenza → ADA</button>
  </div>
  <div class="divider"></div>
  <span class="ctrl-label">Framework:</span>
  <button class="fw-btn active-all" data-fw="" onclick="setFw('',this)">Tutti</button>
  <button class="fw-btn" data-fw="DigComp" onclick="setFw('DigComp',this)" style="color:#0369a1;border-color:#7dd3fc">💻 DigComp</button>
  <button class="fw-btn" data-fw="EntreComp" onclick="setFw('EntreComp',this)" style="color:#c47a1a;border-color:#fbbf24">🚀 EntreComp</button>
  <button class="fw-btn" data-fw="LifeComp" onclick="setFw('LifeComp',this)" style="color:#5f3dc4;border-color:#a78bfa">🎯 LifeComp</button>
  <button class="fw-btn" data-fw="EU Key Competences" onclick="setFw('EU Key Competences',this)" style="color:#003399;border-color:#93c5fd">🇪🇺 EU8</button>
  <div class="divider"></div>
  <div class="top-n">
    <label>Top</label>
    <select id="top-n-sel" onchange="render()">
      <option value="3">3</option>
      <option value="5" selected>5</option>
      <option value="8">8</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="panel-left">
    <div class="search-box">
      <div class="search-input-wrap">
        <input type="text" id="search-input" placeholder="Cerca ADA per codice o titolo..." oninput="onSearch(this.value)">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="search-hint" id="search-hint"></div>
    </div>
    <div class="list-scroll" id="list-panel"></div>
  </div>
  <div class="panel-right" id="results-panel">
    <div class="empty-state">
      <div class="icon">↔️</div>
      <p>Seleziona un elemento dalla lista<br>per vedere i match</p>
    </div>
  </div>
</div>

ncipali caratteristiche degli strumenti digitali di ricerca più comunemente utilizzati, sia basati sull’IA sia tradizionali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.03","ft":"Riconoscere che i risultati o gli output delle ricerche digitali possono contenere informazioni non pertinenti e che tali risultati dipendono dallo strumento di ricerca utilizzato e dal modo in cui la ricerca viene formulata.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.04","ft":"Utilizzare gli strumenti di ricerca digitale per effettuare, perfezionare e aggiornare ricerche di informazioni di base.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.05","ft":"Esplorare in modo intenzionale nuovi strumenti e strategie di ricerca digitale.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.06","ft":"Selezionare strumenti di ricerca digitale appropriati in base ai bisogni informativi.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.07","ft":"Distinguere tra risultati o output di ricerca digitale più e meno pertinenti.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.08","ft":"Tradurre i bisogni informativi in domande, comandi o dichiarazioni di ricerca digitale efficaci, e applicare strategie appropriate per perfezionare o filtrare i risultati.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.09","ft":"Esplorare sistematicamente funzioni e caratteristiche degli strumenti di ricerca digitale, sia familiari sia nuovi, per approfondire le proprie capacità.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.10","ft":"Combinare una varietà di strumenti e strategie di ricerca digitale per rispondere a bisogni informativi complessi.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.11","ft":"Aiutare gli altri nello sviluppo delle loro capacità di ricerca digitale.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.12","ft":"Mantenersi informate sugli sviluppi nelle tecnologie di ricerca digitale.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.13","ft":"Combinare una varietà di strumenti e strategie di ricerca digitale per rispondere a bisogni informativi altamente complessi o specialistici.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.14","ft":"Assistere altri nell'eseguire e perfezionare ricerche complesse o specialistiche in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.1.15","ft":"Contribuire a miglioramenti o nuove soluzioni per ricerche complesse o specialistiche negli ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.01","ft":"Prendere atto dei benefici di un approccio prudente nell'interpretazione di informazioni e contenuti in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.02","ft":"Riconoscere che alcune fonti di informazione e sistemi di informazione digitale potrebbero non essere affidabili.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.03","ft":"Riconoscere che può essere difficile distinguere tra informazioni e contenuti generati da esseri umani e sistemi di IA.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.04","ft":"Riconoscere esempi di misinformazione, disinformazione e fonti di distorsione informativa (bias).","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.05","ft":"Riconoscere esempi di influenza dei social media e di bolle di filtraggio.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.06","ft":"Effettuare una valutazione di base dell'affidabilità e della credibilità delle fonti e dei contenuti informativi digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.07","ft":"Identificare la fonte delle informazioni online e gli scopi dei servizi di fact-checking per sviluppare capacità di pre-bunking e de-bunking.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.08","ft":"Riconoscere che i dati utilizzati per addestrare i sistemi di IA e le modalità di addestramento influiscono sull'affidabilità delle informazioni che forniscono.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.09","ft":"Riconoscere che alcune tecnologie digitali, come i sistemi di IA, possono funzionare come una \"scatola nera\", rendendo difficile spiegare perché o come sia stato prodotto un determinato output.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.10","ft":"Riconoscere che i sistemi di IA possono produrre output imprecisi, anche se apparentemente plausibili, e che la responsabilità finale della verifica della qualità e della validità delle informazioni e dei contenuti generati spetta alla persona che utilizza il sistema di IA.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.11","ft":"Riconoscere che i pregiudizi umani (cognitivi ed emotivi) e distorsioni (bias) dei sistemi di IA (nei dati o nell’addestramento) giocano un ruolo nella generazione e nell'interpretazione delle informazioni.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.12","ft":"Riconoscere e rispondere efficacemente alle strategie di indirizzamento dell'utente negli ambienti digitali quali clickbait, nudging e gamification.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.13","ft":"Valutare criticamente l'affidabilità delle fonti, delle informazioni e dei contenuti negli ambienti digitali, considerando il ruolo dei sistemi di IA, gli effetti di personalizzazione e gli interessi commerciali o di altra natura.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.14","ft":"Esaminare sistematicamente come i sistemi di IA, i pregiudizi e i diversi interessi influenzano la generazione, la presentazione e l'interpretazione di informazioni e dati negli ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.15","ft":"Descrivere le caratteristiche che rendono le tecnologie digitali affidabili, ad esempio, nel caso dei sistemi di IA.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.16","ft":"Descrivere le conseguenze personali, sociali e politiche della misinformazione, della disinformazione, delle fonti di distorsione informativa (bias), dell'influenza dei social media e delle bolle di filtraggio.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.17","ft":"Valutare in modo approfondito l'affidabilità e l'accuratezza di una varietà di fonti, informazioni e contenuti digitali, considerando una gamma di potenziali fattori che possono influenzarle.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.18","ft":"Supportare altri nello sviluppo di capacità per valutare la credibilità e l'affidabilità delle fonti, delle informazioni e dei contenuti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.19","ft":"Valutare ed analizzare sistematicamente fonti, informazioni e contenuti digitali per supportare processi decisionali complessi.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.20","ft":"Sostenere gli altri negli ambienti digitali nello sviluppo di capacità di valutazione critica delle informazioni e dei contenuti, nonché di resilienza alla misinformazione e alla disinformazione.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.2.21","ft":"Guidare o contribuire a iniziative che supportano l'interpretazione accurata delle informazioni negli ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.01","ft":"Prendere atto dei benefici della gestione e dell'organizzazione delle informazioni in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.02","ft":"Riconoscere le funzioni di cancellazione, ripristino e backup dei dati, e le principali proprietà dei file e delle cartelle digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.03","ft":"Scaricare, salvare, recuperare, spostare ed eliminare file digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.04","ft":"Organizzare e formattare dati semplici in un ambiente digitale strutturato, ad esempio nei fogli di calcolo.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.05","ft":"Aggiornare i propri contatti, ad esempio su telefono, e-mail o social media.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.06","ft":"Riconoscere l'importanza di una gestione attenta ed etica dei dati e delle informazioni in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.07","ft":"Applicare convenzioni per la denominazione dei file digitali e organizzare le cartelle digitali secondo strutture gerarchiche.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.08","ft":"Organizzare cartelle e gestire, salvare ed eliminare file su dispositivi digitali, supporti di archiviazione esterni e servizi cloud.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.09","ft":"Identificare i tipi comuni di dati e i loro formati, e utilizzare strumenti di raccolta dati per una semplice elaborazione.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.10","ft":"Gestire le informazioni dei propri account digitali, come quello della posta elettronica.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.11","ft":"Organizzare e formattare dati e applicare formule semplici in un ambiente digitale strutturato, ad esempio nei fogli di calcolo.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.12","ft":"Dare priorità alla gestione e al trattamento etico e trasparente dei dati e delle informazioni in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.13","ft":"Applicare una varietà di funzioni per trasferire e gestire dati e informazioni in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.14","ft":"Descrivere esempi, applicazioni, vantaggi e limitazioni degli open data e dei big data.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.15","ft":"Utilizzare una gamma di strumenti e metodi digitali per raccogliere ed elaborare una varietà di dati e informazioni.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.16","ft":"Sviluppare analisi appropriate di informazioni e dati negli ambienti digitali per contribuire a processi decisionali complessi.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.17","ft":"Supportare gli altri nella gestione, elaborazione e analisi di dati e informazioni in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.18","ft":"Riconoscere l'importanza di strutturare e documentare dati e informazioni negli ambienti digitali a beneficio di altri.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.19","ft":"Sviluppare e attuare strategie per la gestione, l’elaborazione e l’analisi di informazioni e dati complessi o specialistici negli ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.20","ft":"Utilizzare una varietà di strumenti e metodi digitali per elaborare, gestire o analizzare dati complessi o grandi volumi di informazioni.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.21","ft":"Guidare o contribuire a iniziative che supportano gli altri nella gestione, elaborazione e analisi avanzata di dati e informazioni negli ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS1.3.22","ft":"Contribuire al miglioramento o allo sviluppo di nuove soluzioni per la gestione, l'elaborazione e l'analisi di dati complessi in ambienti digitali.","fa":"Ricerca, valutazione e gestione delle informazioni","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.01","ft":"Identificare e utilizzare le funzionalità di base degli strumenti di comunicazione digitale per interagire con singoli individui e gruppi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.02","ft":"Riconoscere l'importanza di tenere conto delle preferenze altrui nella comunicazione digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.03","ft":"Riconoscere le differenze tra interazioni digitali e non digitali, e tra realtà fisiche e virtuali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.04","ft":"Identificare le funzionalità di base degli assistenti virtuali (chatbot) e riconoscere le differenze chiave tra interazioni uomo-macchina e interazioni uomo-uomo.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.05","ft":"Riconoscere, in termini generali, cosa sia un robot, la natura non umana dei robot e che gli esseri umani interagiscono con i robot per svolgere compiti.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.06","ft":"Riconoscere l'importanza di adattare la propria comunicazione digitale a contesti specifici.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.07","ft":"Riconoscere che esiste un continuum tra reale e virtuale negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.08","ft":"Identificare un mezzo di comunicazione adatto per un dato contesto o scopo, considerando opzioni digitali e non digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.09","ft":"Utilizzare molteplici funzionalità di una varietà di strumenti di comunicazione digitale per interagire con e gestire individui, gruppi e canali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.10","ft":"Sviluppare e perfezionare domande, comandi o istruzioni (prompt) per assistenti virtuali (chatbot) e sistemi di IA per gestire interazioni non complesse.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.11","ft":"Definire come gli esseri umani possono interagire con i robot, identificandone le caratteristiche principali (come sensori, software, controlli di movimento e interfaccia uomo-macchina), e riconoscendo che possono operare con diversi gradi di autonomia.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.12","ft":"Adattare sistematicamente la comunicazione negli ambienti digitali in risposta a una varietà di contesti.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.13","ft":"Combinare strumenti e metodi di comunicazione digitale per attività complesse di comunicazione e interazione.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.14","ft":"Sviluppare sistematicamente e perfezionare progressivamente domande, comandi o istruzioni (prompt) per sistemi di IA per gestire interazioni digitali complesse.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.15","ft":"Supportare gli altri nel valutare e selezionare strumenti di comunicazione digitale adeguati a uno scopo specifico.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.16","ft":"Organizzare e/o moderare eventi digitali complessi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.17","ft":"Valutare benefici e svantaggi delle applicazioni robotiche in un contesto specifico.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.18","ft":"Mantenersi informate sugli sviluppi degli strumenti e dei metodi di comunicazione e interazione digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.19","ft":"Valutare e combinare strumenti di comunicazione e interazione digitale per compiti altamente complessi o nuovi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.20","ft":"Fornire orientamento, supporto o leadership nell'uso avanzato di strumenti di comunicazione e interazione.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.1.21","ft":"Guidare o contribuire a miglioramenti o allo sviluppo di nuove soluzioni per la comunicazione digitale o l'interazione uomo-macchina.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.01","ft":"Riconoscere l'importanza della condivisione etica e responsabile di informazioni e contenuti negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.02","ft":"Identificare le funzioni e gli usi dei social media, nonché esempi di piattaforme di social media comunemente utilizzate.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.03","ft":"Riconoscere benefici e rischi della condivisione di informazioni e contenuti in ambienti digitali, e che gli individui possono scegliere come e cosa condividere.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.04","ft":"Riconoscere che informazioni e contenuti - non tutti veri o accurati - possono essere condivisi in vari modi sia dai sistemi di IA che dagli esseri umani.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.05","ft":"Identificare lo scopo e il pubblico di destinazione delle informazioni e dei contenuti da condividere in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.06","ft":"Utilizzare processi semplici per condividere informazioni e contenuti negli ambienti digitali in modo appropriato e coerente con gli obiettivi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.07","ft":"Riconoscere l'importanza di valutare il valore e l'accuratezza delle informazioni e dei contenuti prima di condividerli in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.08","ft":"Definire le responsabilità associate alla condivisione di informazioni e contenuti in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.09","ft":"Descrivere e attuare modi efficaci ed etici per condividere informazioni e contenuti in una varietà di ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.10","ft":"Segnalare o contrassegnare la misinformazione e la disinformazione condivise negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.11","ft":"Riconoscere il valore della condivisione di informazioni e contenuti negli ambienti digitali per supportare altri.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.12","ft":"Condividere informazioni e contenuti in modo efficace ed etico negli ambienti digitali per supportare obiettivi personali, di apprendimento o professionali propri e altrui.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.13","ft":"Consigliare altri su modi efficaci ed etici per condividere informazioni e contenuti in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.14","ft":"Facilitare la condivisione complessa di informazioni attraverso una varietà di tecnologie digitali, esplorando mezzi nuovi e alternativi secondo necessità.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.15","ft":"Contribuire a iniziative complesse o specialistiche per la condivisione di informazioni e contenuti in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.2.16","ft":"Guidare o contribuire a miglioramenti o allo sviluppo di nuove soluzioni per la condivisione di informazioni e contenuti negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.01","ft":"Identificare i principali scopi e funzioni delle piattaforme e dei servizi digitali, utilizzandoli con assistenza quando necessario.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.02","ft":"Riconoscere il potenziale delle tecnologie digitali nel favorire la partecipazione e l’empowerment – e l'esclusione – di se stessi e di specifici gruppi e comunità.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.03","ft":"Riconoscere che esistono leggi e regolamenti a tutela dei diritti degli utenti di piattaforme e servizi digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.04","ft":"Utilizzare strumenti digitali per cercare e individuare comunità per la partecipazione civica su temi di interesse.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.05","ft":"Partecipare a discussioni su temi di cittadinanza digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.06","ft":"Dare priorità all'esplorazione delle modalità con cui le tecnologie digitali possono migliorare la propria partecipazione civica e sociale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.07","ft":"Descrivere i potenziali benefici delle forme comuni di partecipazione digitale, riconoscendo che la partecipazione civica avviene lungo un continuum.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.08","ft":"Riconoscere i diritti fondamentali previsti dalle leggi e dai regolamenti digitali pertinenti, e definire come esercitarli.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.09","ft":"Descrivere come le tecnologie digitali, ad esempio, le piattaforme di social media, possono influenzare alcuni aspetti fondamentali della democrazia (ad esempio, distorcendo il processo elettorale).","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.10","ft":"Descrivere il concetto di economia delle piattaforme, incluse opportunità, rischi, implicazioni sociali ed etiche.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.11","ft":"Descrivere i concetti e le funzioni del monitoraggio civico e dell'e-Government.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.12","ft":"Interagire in modo autonomo ed efficace con piattaforme e servizi digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.13","ft":"Partecipare a discussioni sulle implicazioni etiche, politiche e sociali delle tecnologie digitali, dando priorità all'esplorazione continua dei modi in cui le tecnologie digitali possono supportare l'empowerment e la partecipazione civica.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.14","ft":"Valutare il potenziale delle tecnologie digitali per l'inclusione, l'esclusione e l'intervento civico in un determinato contesto.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.15","ft":"Valutare diverse implicazioni delle tecnologie digitali, come le piattaforme di social media, nei processi democratici.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.16","ft":"Distinguere tra sistemi di IA ad alto rischio e quelli vietati (secondo la legislazione) e i loro potenziali impatti sociali, politici o economici.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.17","ft":"Supportare gli altri nell'identificare opportunità e partecipare agli ambienti digitali per finalità di empowerment (proprio o della comunità) e di partecipazione civica.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.18","ft":"Supportare altri nell'informarsi ed esercitare i propri diritti ai sensi della legislazione digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.19","ft":"Utilizzare conoscenze aggiornate sulle tecnologie digitali e sugli sviluppi legislativi per valutare da una pluralità di prospettive gli impatti delle tecnologie digitali sulla società, sui processi politici o sull'economia.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.20","ft":"Supportare gli altri nella comprensione delle principali disposizioni della legislazione digitale, in relazione a uno specifico contesto.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.3.21","ft":"Guidare o progettare iniziative di cittadinanza digitale, ad esempio per promuovere la partecipazione civica, l'inclusione o l'empowerment.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.01","ft":"Partecipare a gruppi collaborativi tramite strumenti digitali di collaborazione, riconoscendone benefici e limitazioni.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.02","ft":"Riconoscere la presenza di sistemi di IA negli strumenti digitali di collaborazione.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.03","ft":"Riconoscere l'importanza di capacità comunicative efficaci per una collaborazione di successo in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.04","ft":"Creare, gestire e contribuire efficacemente a compiti collaborativi semplici negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.05","ft":"Riconoscere le principali caratteristiche e funzioni di una varietà di strumenti digitali di collaborazione, selezionandoli in base agli obiettivi collaborativi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.06","ft":"Identificare esempi di collaborazione uomo-IA che sia etica, responsabile ed efficace.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.07","ft":"Tenere conto di diverse prospettive per contribuire al raggiungimento di un obiettivo comune in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.08","ft":"Utilizzare e combinare una varietà di strumenti di collaborazione digitale, garantendo un uso proporzionato ed etico delle tecnologie digitali e dei processi di collaborazione uomo-IA, in linea con le esigenze di progetti, compiti e utenti.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.09","ft":"Guidare la collaborazione in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.10","ft":"Sostenere gli altri nello sviluppare le proprie capacità di collaborare in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.11","ft":"Promuovere e supportare l'uso proporzionato, etico ed efficace delle tecnologie digitali, inclusi i sistemi di IA, nei contesti collaborativi.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.12","ft":"Progettare strategie o sistemi di collaborazione complessi o specializzati per ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.13","ft":"Assistere altri nello sviluppo di capacità per guidare la collaborazione in ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.4.14","ft":"Guidare o contribuire a miglioramenti o nuove soluzioni per la collaborazione uomo-IA.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.01","ft":"Riconoscere le differenze nel comportamento verbale e non verbale negli ambienti digitali e non digitali, e che esistono differenze culturali e contestuali nella comunicazione digitale verbale e non verbale digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.02","ft":"Riconoscere l'importanza di dare spazio alle opinioni degli altri negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.03","ft":"Riconoscere che alcuni comportamenti negli ambienti digitali potrebbero non essere accettabili per altri e/o potrebbero avere conseguenze legali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.04","ft":"Utilizzare tono ed espressioni visive (come, ad esempio, le emoji) appropriati negli ambienti digitali formali e non formali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.05","ft":"Descrivere la relazione tra comportamento digitale e reputazione digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.06","ft":"Dare priorità a comportamenti digitali che favoriscono l'inclusione e una reputazione digitale positiva per sé stessi e per gli altri.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.07","ft":"Identificare i diritti e le responsabilità fondamentali di bambini e adulti in relazione al comportamento digitale.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.08","ft":"Rispondere con comunicazione e comportamento efficaci e rispettosi a situazioni difficili o complesse negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.09","ft":"Distinguere tra comportamenti etici, legali e illegali negli ambienti digitali, riconoscendo che queste distinzioni possono essere complesse.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.10","ft":"Analizzare i modelli di abuso nei confronti di gruppi specifici maturati negli ambienti digitali e i loro potenziali impatti, e descrivere i modi in cui possono essere segnalati e affrontati.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.11","ft":"Promuovere e supportare comportamenti inclusivi e rispettosi negli ambienti digitali.","fa":"Comunicazione e collaborazione","fw":"DigComp","ver":"3.0"},{"fc":"CS2.5.12","ft":"Supportare gli altri nello sviluppo delle proprie capacità di
